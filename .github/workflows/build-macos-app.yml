name: Build macOS app (Apple Silicon)

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-macos-app:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Resolve app version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "APP_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          else
            echo "APP_VERSION=0.0.0-${GITHUB_SHA::7}" >> "$GITHUB_ENV"
          fi

      - name: Build .app bundle
        shell: bash
        run: |
          chmod +x /home/runner/work/claude-code/claude-code/scripts/build-macos-app.sh
          /home/runner/work/claude-code/claude-code/scripts/build-macos-app.sh

      - name: Upload .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: claude-code-macos-app
          path: /home/runner/work/claude-code/claude-code/dist/macos/Claude Code.app
          if-no-files-found: error

      - name: Upload zipped artifact
        uses: actions/upload-artifact@v4
        with:
          name: claude-code-macos-app-zip
          path: /home/runner/work/claude-code/claude-code/dist/macos/Claude Code-macos-arm64.zip
          if-no-files-found: error
